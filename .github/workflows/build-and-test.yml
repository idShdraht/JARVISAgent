name: JARVIS Release Pipeline Governance

on:
  push:
    branches:
      - main
      - stable

jobs:
  build-and-test:
    name: Matrix OS Integrity & Runtime Validation
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ── Lockfile gate ──────────────────────────────────────
      - name: Verify lockfile exists
        run: |
          test -f package-lock.json || (echo "FATAL: Missing package-lock.json" && exit 1)

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ── Root dependency install (deterministic) ────────────
      - name: Install root dependencies
        run: npm ci

      # ── Supply chain fetch (with local fallback) ───────────
      - name: Supply Chain Integrity Fetch
        run: bash scripts/build/fetch-upstream.sh

      # ── pnpm setup + upstream deps (before AST rebranding) ─
      # ts-morph needs the project's types resolved, which requires
      # dependencies to be installed first
      - name: Setup pnpm
        if: matrix.node-version == '22.x'
        run: |
          corepack enable
          corepack prepare pnpm@10.23.0 --activate

      - name: Install upstream dependencies
        if: matrix.node-version == '22.x'
        run: pnpm install --no-frozen-lockfile
        working-directory: ./package

      # ── AST Rebranding & Version Synthesis (after deps) ────
      - name: AST Rebranding & Version Synthesis
        if: matrix.node-version == '22.x'
        run: |
          node scripts/build/rebrand-ast.js
          node scripts/build/sync-version.js
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      # ── Drift detection ────────────────────────────────────
      - name: Detect Semantic Drift
        run: |
          EXIT_CODE=0
          node scripts/ci/drift-detector.js || EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "FATAL: Upstream structural drift detected!"
            exit 1
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "WARNING: Drift detector precondition failure (exit 2). Continuing."
          fi

      # ── Build (Node 22 only — core requires >=22.12) ──────
      - name: Build Payload
        if: matrix.node-version == '22.x'
        run: pnpm run build
        working-directory: ./package

      # ── Artifact packaging & verification ──────────────────
      - name: Immutable Artifact Packaging Check
        if: matrix.node-version == '22.x'
        run: |
          cd package
          TARBALL=$(npm pack --json 2>/dev/null | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');try{const j=JSON.parse(d);console.log(j[0].filename||j.filename)}catch{}" 2>/dev/null || ls -1 *.tgz 2>/dev/null | head -1)
          if [ -z "$TARBALL" ]; then
            echo "FATAL: npm pack produced no tarball"
            ls -la *.tgz 2>/dev/null || echo "No .tgz files found"
            exit 1
          fi
          echo "Packed tarball: $TARBALL"
          cd ..
          node scripts/build/verify-artifact.js "package/$TARBALL"

      # ── Smoke test (Node 22 only, cross-platform timeout) ──
      - name: System Smoke Test & Timeout Guards
        if: matrix.node-version == '22.x'
        continue-on-error: true
        run: |
          cd package
          node -e "
            const { spawn } = require('child_process');
            const proc = spawn('node', ['jarvis.mjs', 'onboard', '--flow', 'quickstart', '--accept-risk', '--non-interactive'], { stdio: 'inherit' });
            const timer = setTimeout(() => { proc.kill(); process.exit(0); }, 20000);
            proc.on('close', (code) => { clearTimeout(timer); process.exit(0); });
            proc.on('error', () => { clearTimeout(timer); process.exit(0); });
          "

      # ── Gateway health check (Node 22, Linux/macOS only) ───
      - name: EADDRINUSE Resilience & Health Check
        if: matrix.node-version == '22.x' && runner.os != 'Windows'
        continue-on-error: true
        run: |
          cd package

          node -e "
            const { spawn } = require('child_process');
            const fs = require('fs');

            const proc = spawn('node', ['jarvis.mjs', 'gateway', '--port', '18789'], {
              stdio: ['ignore', 'pipe', 'pipe'],
              detached: false
            });

            let logData = '';
            proc.stdout.on('data', (d) => { logData += d.toString(); });
            proc.stderr.on('data', (d) => { logData += d.toString(); });

            setTimeout(() => {
              fs.writeFileSync('gateway.log', logData);
              proc.kill();
              process.exit(0);
            }, 5000);

            proc.on('error', () => process.exit(0));
          "

          if [ -f gateway.log ]; then
            BOUND_PORT=$(node ../scripts/ci/extract-port.js gateway.log 2>/dev/null) || true
            if [ -n "$BOUND_PORT" ]; then
              echo "Gateway bound at port $BOUND_PORT"
            else
              echo "WARNING: Could not extract gateway port."
            fi
          fi

      # ── Skills ABI test (Node 22 only) ─────────────────────
      - name: Dynamic ABI Compatibility Test (Skill Space)
        if: matrix.node-version == '22.x'
        continue-on-error: true
        run: |
          cd package
          node jarvis.mjs skills install openclaw-test-skill 2>/dev/null || echo "Skill install skipped"
          node jarvis.mjs skills run openclaw-test-skill 2>/dev/null | grep "success" || echo "Skill test skipped"

  publish-next:
    name: Synthesized Deployment to next region
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Verify lockfile exists
        run: |
          test -f package-lock.json || (echo "FATAL: Missing package-lock.json" && exit 1)

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Fetch and Build
        run: |
          bash scripts/build/fetch-upstream.sh
          corepack enable
          corepack prepare pnpm@10.23.0 --activate
          cd package
          pnpm install --no-frozen-lockfile
          cd ..
          node scripts/build/rebrand-ast.js
          node scripts/build/sync-version.js
          cd package && pnpm run build && cd ..
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Publish Strict Next Block
        run: |
          cd package
          npm publish --tag next --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
