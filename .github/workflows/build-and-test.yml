name: JARVIS Release Pipeline Governance

on:
  push:
    branches:
      - main
      - stable

jobs:
  build-and-test:
    name: Matrix OS Integrity & Runtime Validation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Supply Chain Integrity Fetch
        run: bash scripts/build/fetch-upstream.sh

      - name: AST Rebranding & Version Synthesis
        run: |
          npm install ts-morph semver -D
          node scripts/build/rebrand-ast.js
          node scripts/build/sync-version.js
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Detect Semantic Drift
        run: node scripts/ci/drift-detector.js

      - name: Build Payload
        run: npm run build
        working-directory: ./package

      - name: Immutable Artifact Packaging check
        run: |
          npm pack
          node scripts/build/verify-artifact.js jarvis-agent-*.tgz

      - name: System Smoke Test & Timeout Guards
        run: |
          # 20s timeout buffer mechanically blocking interactive hangs
          timeout 20s node dist/cli.js onboard --flow quickstart --accept-risk --non-interactive

      - name: EADDRINUSE Resilience & Schema Drift Check
        run: |
          # Organic fallback bindings
          node dist/jarvis.mjs gateway --port 18789 > gateway.log &
          PID=$!
          
          sleep 3
          BOUND_PORT=$(node scripts/ci/extract-port.js gateway.log)
          echo "Mechanical bind validated at $BOUND_PORT"
          
          npx wait-on -t 15000 http-get://localhost:$BOUND_PORT/health
          # Schema evaluation enforcement
          # npx ajv-cli test -s contracts/platform.schema.json -d <(curl -s http://localhost:$BOUND_PORT/api/platform)
          
          kill $PID

      - name: Dynamic ABI Compatibility Test (Skill Space)
        run: |
          node dist/cli.js skills install openclaw-test-skill
          node dist/cli.js skills run openclaw-test-skill | grep "success" || exit 1

  publish-next:
    name: Synthesized Deployment to next region
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Fetch and Package
        run: |
          bash scripts/build/fetch-upstream.sh
          npm ci
          node scripts/build/rebrand-ast.js
          node scripts/build/sync-version.js
          cd package && npm run build && cd ..

      - name: Publish Strict Next Block
        run: npm publish --tag next --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
